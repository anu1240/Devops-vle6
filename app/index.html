<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopEasy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="fade-in">
    <h1>🛒 ShopEasy</h1>
    <p>Premium Shopping Experience</p>
</header>

<section class="products">

    <div class="card fade-in">
        <img src="https://via.placeholder.com/200">
        <h3>Smart Watch</h3>
        <p>₹2,999</p>
        <button onclick="addToCart('Smart Watch')">Add to Cart</button>
    </div>

    <div class="card fade-in">
        <img src="https://via.placeholder.com/200">
        <h3>Wireless Earbuds</h3>
        <p>₹1,499</p>
        <button onclick="addToCart('Earbuds')">Add to Cart</button>
    </div>

    <div class="card fade-in">
        <img src="https://via.placeholder.com/200">
        <h3>Gaming Mouse</h3>
        <p>₹799</p>
        <button onclick="addToCart('Mouse')">Add to Cart</button>
    </div>

</section>

<footer>
    <p>🚀 Deployed with DevOps CI/CD</p>
</footer>

<script src="script.js"></script>
</body>
</html>
